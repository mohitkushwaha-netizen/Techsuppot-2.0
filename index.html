<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tech Support Pro Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

<style>
:root{
 --bg:#0b0f14;
 --card:#111827;
 --text:#e5e7eb;
 --primary:#22c55e;
 --border:#1f2937;
}
body{
 margin:0;
 font-family:Segoe UI,sans-serif;
 background:var(--bg);
 color:var(--text);
}
.header{
 padding:18px;
 font-size:22px;
 display:flex;
 justify-content:space-between;
 border-bottom:1px solid var(--border);
}
.container{padding:20px}
.card{
 background:var(--card);
 border-radius:12px;
 padding:20px;
 margin-bottom:20px;
}
.kpis{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:15px;
}
.kpi{
 text-align:center;
 padding:15px;
 border-radius:10px;
 background:#020617;
}
.kpi h2{color:var(--primary)}

table{
 width:100%;
 border-collapse:collapse;
}
th,td{
 padding:10px;
 text-align:center;
 border-bottom:1px solid var(--border);
}
th{color:#38bdf8}

.chart-box{height:350px}
</style>
</head>

<body id="dashboard">

<div class="header">
🚀 Tech Support Dashboard (Advanced)
<button onclick="exportPDF()">Export PDF</button>
</div>

<div class="container">

<div class="card">
<input type="file" id="upload">
<select id="agentFilter" multiple size="5" onchange="applyFilter()"></select>
</div>

<div class="kpis">
<div class="kpi"><div>Total</div><h2 id="kTotal">0</h2></div>
<div class="kpi"><div>Closed</div><h2 id="kClosed">0</h2></div>
<div class="kpi"><div>Escalated</div><h2 id="kEsc">0</h2></div>
<div class="kpi"><div>Working</div><h2 id="kWork">0</h2></div>
<div class="kpi"><div>New</div><h2 id="kNew">0</h2></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Agent</th>
<th>Closed</th>
<th>Esc</th>
<th>Working</th>
<th>New</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="card">
<h3>📊 Agent-wise Stacked Performance</h3>
<div class="chart-box"><canvas id="stackChart"></canvas></div>
</div>

<div class="card">
<h3>📈 Closed Distribution</h3>
<div class="chart-box"><canvas id="pieChart"></canvas></div>
</div>

</div>

<script>
let rawData=[], stackChart, pieChart;

function processData(rows){
 rawData=rows;
 let agents=[...new Set(rows.map(r=>r["Case Owner"]||"Unassigned"))];
 let sel=document.getElementById("agentFilter");
 sel.innerHTML="";
 agents.forEach(a=>sel.innerHTML+=`<option value="${a}">${a}</option>`);
 applyFilter();
}

function applyFilter(){
 let sel=[...document.getElementById("agentFilter").selectedOptions].map(o=>o.value);
 let rows=sel.length?rawData.filter(r=>sel.includes(r["Case Owner"]||"Unassigned")):rawData;

 let map={},closed=0,esc=0,work=0,newCount=0;

 rows.forEach(r=>{
  let o=r["Case Owner"]||"Unassigned";
  let s=(r["Status"]||"").toLowerCase();

  map[o]??={c:0,e:0,w:0,n:0,t:0};
  map[o].t++;

  if(s.includes("close")){
    map[o].c++; closed++;
  }
  else if(s.includes("escal")){
    map[o].e++; esc++;
  }
  else if(s.includes("new")){
    map[o].n++; newCount++;
  }
  else{
    map[o].w++; work++;
  }
 });

 document.getElementById("kTotal").innerText=rows.length;
 document.getElementById("kClosed").innerText=closed;
 document.getElementById("kEsc").innerText=esc;
 document.getElementById("kWork").innerText=work;
 document.getElementById("kNew").innerText=newCount;

 let tb=document.getElementById("tableBody");
 tb.innerHTML="";

 let labels=[],closedArr=[],escArr=[],workArr=[],newArr=[];

 Object.entries(map).forEach(([k,v])=>{
  labels.push(k);
  closedArr.push(v.c);
  escArr.push(v.e);
  workArr.push(v.w);
  newArr.push(v.n);

  tb.innerHTML+=`
  <tr>
  <td>${k}</td>
  <td>${v.c}</td>
  <td>${v.e}</td>
  <td>${v.w}</td>
  <td>${v.n}</td>
  <td>${v.t}</td>
  </tr>`;
 });

 renderStackChart(labels,closedArr,escArr,workArr,newArr);
 renderPie(labels,closedArr);
}

function renderStackChart(labels,c,e,w,n){
 if(stackChart) stackChart.destroy();

 stackChart=new Chart(document.getElementById("stackChart"),{
  type:"bar",
  data:{
    labels:labels,
    datasets:[
      {label:"Closed",data:c,backgroundColor:"#22c55e"},
      {label:"Escalated",data:e,backgroundColor:"#ef4444"},
      {label:"Working",data:w,backgroundColor:"#facc15"},
      {label:"New",data:n,backgroundColor:"#3b82f6"}
    ]
  },
  options:{
    responsive:true,
    plugins:{legend:{position:"top"}},
    scales:{
      x:{stacked:true},
      y:{stacked:true}
    }
  }
 });
}

function renderPie(labels,data){
 if(pieChart) pieChart.destroy();

 pieChart=new Chart(document.getElementById("pieChart"),{
  type:"pie",
  data:{
    labels:labels,
    datasets:[{
      data:data,
      backgroundColor:["#22c55e","#3b82f6","#f59e0b","#ef4444","#a855f7"]
    }]
  }
 });
}

document.getElementById("upload").onchange=e=>{
 let reader=new FileReader();
 reader.onload=ev=>{
  let wb=XLSX.read(ev.target.result,{type:"binary"});
  processData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
 };
 reader.readAsBinaryString(e.target.files[0]);
};

function exportPDF(){
 html2pdf().from(document.getElementById("dashboard")).save("Dashboard.pdf");
}
</script>

</body>
</html>
